<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Buddy</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-color: #4CAF50;
            --hover-color: #45a049;
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }
        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: var(--text-color);
            margin-top: 0;
        }
        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 1rem;
        }
        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: var(--hover-color);
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #output {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #eee;
            display: none;
            line-height: 1.6;
        }
        .error {
            color: #d32f2f;
            background-color: #ffebee;
            padding: 10px;
            border-radius: 5px;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📚 AI Study Buddy</h1>
        <p class="subtitle">Type any subject below to generate a detailed study guide instantly.</p>

        <input type="text" id="topicInput" placeholder="e.g., Cellular Respiration, Python Basics, Linear Algebra...">
        <button id="generateBtn" onclick="generateStudyGuide()">Generate Study Guide</button>

        <div id="errorMessage" class="error"></div>
        <div id="output"></div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // REPLACE THIS WITH YOUR ACTUAL GOOGLE GEMINI API KEY
        const API_KEY = "YOUR_API_KEY_HERE"; 

        async function generateStudyGuide() {
            const topic = document.getElementById('topicInput').value.trim();
            const btn = document.getElementById('generateBtn');
            const outputDiv = document.getElementById('output');
            const errorDiv = document.getElementById('errorMessage');

            // Reset UI
            errorDiv.style.display = 'none';
            outputDiv.style.display = 'none';

            if (!topic) {
                showError("⚠️ Please enter a topic first.");
                return;
            }

            if (API_KEY === "YOUR_API_KEY_HERE") {
                showError("🔑 Please add your API key to the JavaScript code.");
                return;
            }

            // Set Loading State
            btn.disabled = true;
            btn.innerText = "🧠 Compiling study materials...";

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            
            const promptText = `You are an expert tutor. Create a highly detailed and perfectly structured study guide about the following topic: '${topic}'. \n\nYou must strictly organize your response using the following Markdown sections:\n### 📋 Overview\nProvide a brief, easy-to-understand explanation of the topic.\n\n### 🔑 Key Concepts\nProvide a bulleted list of essential terms, vocabulary, and their precise definitions.\n\n### ⚙️ Crucial Details\nInclude important formulas, key dates, rules, or historical figures relevant to the topic.\n\n### 📝 Quick Review\nProvide a short, one-paragraph summary wrapping up the main takeaways.`;

            const payload = {
                contents: [{
                    parts: [{ text: promptText }]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                const aiResponseText = data.candidates[0].content.parts[0].text;

                // Use marked.js to convert the Markdown to HTML
                outputDiv.innerHTML = marked.parse(aiResponseText);
                outputDiv.style.display = 'block';

            } catch (error) {
                showError(`❌ An error occurred: ${error.message}. Check your API key and internet connection.`);
            } finally {
                // Remove Loading State
                btn.disabled = false;
                btn.innerText = "Generate Study Guide";
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.innerText = message;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
